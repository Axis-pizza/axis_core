name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install
      - name: Show pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --check

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install
      - name: Show pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Build workspace
        run: cargo build

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install
      - name: Show pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Test workspace
        run: cargo test

  bpf-entrypoint-build:
    name: bpf-entrypoint build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install
      - name: Show pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Build axis-core with bpf-entrypoint feature
        run: cargo build -p axis-core --features bpf-entrypoint
